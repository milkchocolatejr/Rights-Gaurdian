<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090e17">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="../icons/icon.svg" type="image/svg+xml">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/themes/theme-brass-ink.css">
  <link rel="stylesheet" href="../css/themes/theme-debug.css">

  <!-- Shared theme (palette, fonts, chrome) then index structure -->
  <script src="../js/config.js" defer></script>
  <script src="../js/strings.js" defer></script>
  <script src="../js/common.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById('recBtn').addEventListener("click", function() {
        window.location.href = window.location.href.replace("index.html", "listening.html");
      });
    });
  </script>
  <title>Rights Guardian</title>
</head>
<body class="rg-body">
  <div class="app d-flex flex-column min-vh-100">

    <!-- Title -->
    <header class="app-top text-center">
      <h1 class="app-title">Rights <span class="amp">Guardian</span></h1>
    </header>

    <!-- Center: guardian medallion -->
    <main class="app-main flex-grow-1 d-flex flex-column align-items-center justify-content-center">
      <button class="guardian" id="recBtn" onclick="location.href='listening.html'" aria-label="Go to recording">
        <span class="guardian-glow" aria-hidden="true"></span>
        <span class="guardian-ring" aria-hidden="true"></span>
        <img class="guardian-img" src="../icons/guardian.png" alt="Rights Guardian emblem">
      </button>

      <p class="subtitle" id="subtitle">Tap the emblem to begin</p>
    </main>

    <!-- Bottom bar (injected by common.js) -->
    <div id="app-footer"></div>
  </div>

  <!-- ===== Settings modal ===== -->
  <div id="settings-modal"></div>

  <!-- ===== Learn More modal ===== -->
  <div id="learm-more-modal">
  </div>

  <!-- ===== Notices & Disclosures modal ===== -->
  <div id="notices-modal">
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
