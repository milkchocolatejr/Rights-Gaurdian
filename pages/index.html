<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <title>Audio Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 2rem; font-weight: 300; letter-spacing: 1px; }
    .rec-btn {
      width: 120px; height: 120px; border-radius: 50%;
      border: 4px solid #e94560; background: transparent;
      font-size: 1.1rem; color: #eee; cursor: pointer;
      transition: all .3s; position: relative;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .rec-btn:hover { background: #e9456022; }
    .rec-btn.recording {
      background: #e94560; border-color: #e94560;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .rec-btn.recording::after {
      content: ''; width: 40px; height: 40px; border-radius: 4px;
      background: #fff; transition: all .3s;
    }
    .rec-btn:not(.recording)::after {
      content: ''; width: 50px; height: 50px; border-radius: 50%;
      background: #e94560; transition: all .3s;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #e9456080; }
      50% { box-shadow: 0 0 0 20px #e9456000; }
    }
    .status { margin-top: 1.5rem; font-size: .9rem; opacity: .7; min-height: 1.5rem; }
    .controls { margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .controls button {
      padding: .6rem 1.5rem; border-radius: 2rem; border: 1px solid #555;
      background: transparent; color: #ddd; cursor: pointer; font-size: .9rem;
      transition: all .2s; display: none;
    }
    .controls button:hover { background: #ffffff15; }
    .controls button.visible { display: inline-block; }
    .timer { font-size: 2rem; font-weight: 300; margin-top: 1rem; font-variant-numeric: tabular-nums; opacity: .5; }
    .recordings { margin-top: 2rem; list-style: none; text-align: left; max-width: 400px; margin-inline: auto; }
    .recordings li {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem .8rem; margin-top: .5rem; background: #ffffff08;
      border-radius: .5rem; gap: 1rem;
    }
    .recordings li audio { height: 2rem; flex: 1; min-width: 0; }
    .recordings li button {
      background: none; border: none; color: #e94560; cursor: pointer; font-size: 1.2rem;
      padding: .2rem .4rem; border-radius: .3rem;
    }
    .recordings li button:hover { background: #ffffff10; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Audio Recorder</h1>
    <button class="rec-btn" id="recBtn" aria-label="Toggle recording"></button>
    <div class="timer" id="timer">00:00</div>
    <div class="status" id="status">Ready</div>
    <div class="controls">
      <button id="saveBtn">Save</button>
      <button id="discardBtn">Discard</button>
    </div>
    <ul class="recordings" id="recordingsList"></ul>
  </div>
  <script>
    const recBtn = document.getElementById('recBtn');
    const statusEl = document.getElementById('status');
    const timerEl = document.getElementById('timer');
    const saveBtn = document.getElementById('saveBtn');
    const discardBtn = document.getElementById('discardBtn');
    const recordingsList = document.getElementById('recordingsList');

    let mediaRecorder = null;
    let audioChunks = [];
    let recording = false;
    let timerInterval = null;
    let seconds = 0;
    let currentBlob = null;

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          currentBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          saveBtn.classList.add('visible');
          discardBtn.classList.add('visible');
          statusEl.textContent = 'Recording stopped. Save or discard.';
        };
        mediaRecorder.start();
        recording = true;
        recBtn.classList.add('recording');
        seconds = 0;
        timerInterval = setInterval(() => {
          seconds++;
          timerEl.textContent = `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
        }, 1000);
        statusEl.textContent = 'Recording...';
        saveBtn.classList.remove('visible');
        discardBtn.classList.remove('visible');
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      recording = false;
      recBtn.classList.remove('recording');
      clearInterval(timerInterval);
    }

    function saveRecording() {
      if (!currentBlob) return;
      const ext = currentBlob.type.includes('webm') ? 'webm' : 'audio';
      const filename = `recording-${new Date().toISOString().slice(0, 19).replace(/[:-]/g, '')}.${ext}`;
      const url = URL.createObjectURL(currentBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      addToList(currentBlob, filename);
      resetAfterSave();
    }

    function discardRecording() {
      currentBlob = null;
      resetAfterSave();
      statusEl.textContent = 'Discarded';
    }

    function resetAfterSave() {
      saveBtn.classList.remove('visible');
      discardBtn.classList.remove('visible');
      timerEl.textContent = '00:00';
    }

    function addToList(blob, filename) {
      const url = URL.createObjectURL(blob);
      const li = document.createElement('li');
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = url;
      const del = document.createElement('button');
      del.textContent = '✕';
      del.setAttribute('aria-label', 'Delete recording');
      del.onclick = () => { li.remove(); URL.revokeObjectURL(url); };
      li.append(audio, del);
      recordingsList.prepend(li);
    }

    recBtn.addEventListener('click', () => {
      if (recording) stopRecording();
      else startRecording();
    });

    saveBtn.addEventListener('click', saveRecording);
    discardBtn.addEventListener('click', discardRecording);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
