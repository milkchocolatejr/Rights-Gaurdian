<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listening — Rights Guardian</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="../js/common.js" defer></script>
  <style>
    /* ===== Rights-Gaurdian: Listening Page ===== */
    :root {
      --bg-page: #f5f5f5;
      --bg-breathing: transparent;
      --circle-bg-outer: rgba(0, 0, 0, 0.04);
      --circle-border-outer: #ccc;
      --circle-bg-inner: rgba(0, 0, 0, 0.08);
      --circle-border-inner: #aaa;
      --bg-status-text: transparent;
      --bg-waveform: transparent;
      --bg-transcript: transparent;
      --bg-notifications: transparent;
      --bg-notification-item: transparent;
      --section-border: 1px solid #ddd;
    }
    body.debug {
      --bg-page: #ffd43b;
      --bg-breathing: #a1887f;
      --circle-bg-outer: rgba(135, 206, 235, 0.5);
      --circle-border-outer: #4fc3f7;
      --circle-bg-inner: rgba(135, 206, 235, 0.65);
      --circle-border-inner: #4fc3f7;
      --bg-status-text: #ce93d8;
      --bg-waveform: #f48fb1;
      --bg-transcript: #ef5350;
      --bg-notifications: #b39ddb;
      --bg-notification-item: #d1c4e9;
      --section-border: 2px dashed #333;
    }
    body.listening-page {
      background-color: var(--bg-page);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .listening-layout {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      padding: 3rem 2rem;
      gap: 2rem;
    }
    .listening-breathing {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 2.5rem;
      background: var(--bg-breathing);
      border-radius: 50%;
    }
    .listening-breathing .circle-outer {
      position: absolute;
      width: 180px; height: 180px; border-radius: 50%;
      background: var(--circle-bg-outer);
      border: 3px solid var(--circle-border-outer);
      animation: breathe 3s ease-in-out infinite;
    }
    .listening-breathing .circle-inner {
      position: absolute;
      width: 120px; height: 120px; border-radius: 50%;
      background: var(--circle-bg-inner);
      border: 3px solid var(--circle-border-inner);
      animation: breathe 3s ease-in-out infinite;
      animation-delay: -1s;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    .listening-status-text {
      border: var(--section-border);
      padding: 1rem; border-radius: 8px;
      background: var(--bg-status-text);
    }
    .listening-waveform {
      border: var(--section-border);
      min-height: 100px; padding: 1rem; border-radius: 8px;
      background: var(--bg-waveform);
    }
    .listening-transcript {
      border: var(--section-border);
      min-height: 150px; padding: 1rem; border-radius: 8px;
      background: var(--bg-transcript);
    }
    /* Notifications panel */
    .listening-notifications {
      border: var(--section-border);
      padding: 1rem;
      border-radius: 8px;
      background: var(--bg-notifications);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .notification-item {
      border: var(--section-border);
      padding: 0.75rem;
      border-radius: 6px;
      background: var(--bg-notification-item);
    }
    .notification-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
    }
    .notification-text {
      font-size: 0.8rem;
      margin: 0;
      opacity: 0.75;
    }
    /* Desktop (lg+): side-by-side layout */
    @media (min-width: 992px) {
      .listening-layout {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
      }
      .listening-main {
        flex: 0 0 580px;
      }
      .listening-notifications {
        flex: 0 0 500px;
        position: sticky;
        top: 2rem;
      }
    }
    /* debug toggle button */
    #debug-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      padding: 6px 14px; font-size: 13px; border-radius: 6px;
      border: 1px solid #888; cursor: pointer;
      background: rgba(0,0,0,0.08); color: #333;
      font-family: inherit; transition: background .2s;
    }
    #debug-toggle:hover { background: rgba(0,0,0,0.15); }
  </style>
</head>
<body class="listening-page debug">

  <!-- Debug toggle — remove for production -->
  <button id="debug-toggle" onclick="document.body.classList.toggle('debug');this.textContent=document.body.classList.contains('debug')?'Debug: ON':'Debug: OFF'">Debug: ON</button>

  <div class="listening-layout">

    <!-- ===== Main Content Column ===== -->
    <div class="listening-main">

      <!-- ===== Breathing Circles ===== -->
      <div class="listening-breathing">
        <div class="circle-outer"></div>
        <div class="circle-inner"></div>
      </div>

      <!-- ===== Sections (stacked vertically) ===== -->

      <!-- Section 1: Status Text -->
      <section class="listening-status-text mb-4">
        <h2 class="fw-light">Listening…</h2>
        <p class="text-muted mb-0">Microphone is active — awaiting input</p>
      </section>

      <!-- Section 2: Live Audio Waveform -->
      <section class="listening-waveform mb-4">
        <!-- waveform rendering will go here -->
      </section>

      <!-- Section 3: Live STT Transcript -->
      <section class="listening-transcript">
        <!-- live transcript will appear here -->
      </section>

    </div>

    <!-- ===== Notifications Panel (side panel on desktop, below on mobile) ===== -->
    <aside class="listening-notifications">
      <div class="notification-item">
        <h3 class="notification-title">Motion Detected</h3>
        <p class="notification-text">Front entrance — 2m ago</p>
      </div>
      <div class="notification-item">
        <h3 class="notification-title">Audio Alert</h3>
        <p class="notification-text">Glass break detected — 5m ago</p>
      </div>
      <div class="notification-item">
        <h3 class="notification-title">System Status</h3>
        <p class="notification-text">All sensors online</p>
      </div>
      <div class="notification-item">
        <h3 class="notification-title">Recording Saved</h3>
        <p class="notification-text">2026-07-17_14-30-22.wav</p>
      </div>
    </aside>

  </div>

</body>
</html>
