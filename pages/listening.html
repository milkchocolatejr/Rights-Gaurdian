<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening — Rights Guardian</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Page styles -->
  <link rel="stylesheet" href="../css/listening.css">

  <script src="../js/common.js" defer></script>
  <script src="../js/listening.js" defer></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      var breathing = document.getElementById('listening-breathing');
      if (breathing) breathing.addEventListener('click', toggleAnimation);
    });
  </script>
  <style>
    /* Toggle button — dev only */
    #debug-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      padding: 6px 14px; font-size: 13px; border-radius: 6px;
      border: 1px solid #888; cursor: pointer;
      background: rgba(0,0,0,0.08); color: #333;
      font-family: inherit; transition: background .2s;
    }
    #debug-toggle:hover { background: rgba(0,0,0,0.15); }
  </style>
  </head>
  <body class="listening-page debug">

    <!-- Debug toggle — remove for production -->
    <button id="debug-toggle" onclick="document.body.classList.toggle('debug');this.textContent=document.body.classList.contains('debug')?'Debug: ON':'Debug: OFF'">Debug: ON</button>

    <div id="listening-layout" class="listening-layout">

      <!-- ===== Main Content Column ===== -->
      <div id="listening-main" class="listening-main">

        <!-- ===== Breathing Circles ===== -->
        <div id="listening-breathing" class="listening-breathing">
          <div id="circle-outer" class="circle-outer"></div>
          <div id="circle-inner" class="circle-inner"></div>
        </div>

        <!-- ===== Sections (stacked vertically) ===== -->

        <!-- Section 1: Status Text -->
        <section id="listening-status-text" class="listening-status-text mb-4">
          <h2 class="fw-light">Listening…</h2>
          <p class="text-muted mb-0">Microphone is active — awaiting input</p>
        </section>

        <!-- Section 2: Live Audio Waveform -->
        <section id="listening-waveform" class="listening-waveform mb-4">
          <!-- waveform rendering will go here -->
        </section>

        <!-- Section 3: Live STT Transcript -->
        <section id="listening-transcript" class="listening-transcript">
          <!-- live transcript will appear here -->
          <p id="live-transcription"></p>
        </section>

      </div>

      <!-- ===== Notifications Panel (side panel on desktop, below on mobile) ===== -->
      <aside id="notification-panel" class="listening-notifications">
        <div id="notification-1" class="notification-item">
          <h3 class="notification-title">Motion Detected</h3>
          <p class="notification-text">Front entrance — 2m ago</p>
        </div>
        <div id="notification-2" class="notification-item">
          <h3 class="notification-title">Audio Alert</h3>
          <p class="notification-text">Glass break detected — 5m ago</p>
        </div>
        <div id="notification-3" class="notification-item">
          <h3 class="notification-title">System Status</h3>
          <p class="notification-text">All sensors online</p>
        </div>
        <div id="notification-4" class="notification-item">
          <h3 class="notification-title">Recording Saved</h3>
          <p class="notification-text">2026-07-17_14-30-22.wav</p>
        </div>
      </aside>

    </div>

  </body>
</html>
